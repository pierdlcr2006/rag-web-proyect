services:
  frontend:
    build:
      context: .
      target: development
    container_name: rag_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - rag-network

networks:
  rag-network:
    external: true
